<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Online HP Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1 style="font-size:2.3rem;line-height:1.2;letter-spacing:2px;">🌏 Earth Online <span style="color:#ff69b4;">HP</span> Check <span style="font-size:1.5rem;">💖</span></h1>
      <p style="font-size:1.13rem;color:#ff69b4;font-weight:700;margin:10px 0 0 0;">online玩家请及时查看生命值</p>
      <p style="color:#7f8c8d;max-width:600px;margin:10px auto 0;">输入体检报告、症状、药品、饮食习惯等，获取专属饮食/生活/运动建议，守护你的HP！</p>
    </header>

    <main>
      <section class="main-card">
        <h2>主功能：健康建议生成</h2>
        <form id="adviceForm" autocomplete="off">
          <div class="advice-row">
            <textarea id="healthInput" rows="4" placeholder="请粘贴体检报告、描述症状、列出正在服用的药品、饮食习惯等..." required></textarea>
          </div>
          <button id="adviceButton" type="submit">生成健康建议</button>
        </form>
        <div id="adviceResult" class="advice-result-box">
          <p class="hint">请描述您的健康状况、饮食、用药等，点击生成建议。</p>
        </div>
      </section>

      <section class="sub-card">
        <h3>药物相互作用查询</h3>
        <div class="drug-row">
          <div class="input-group">
            <label for="drug1">药物一</label>
            <input id="drug1" type="text" placeholder="例如：阿司匹林" autocomplete="off" />
          </div>
          <div class="input-group">
            <label for="drug2">药物二</label>
            <input id="drug2" type="text" placeholder="例如：华法林" autocomplete="off" />
          </div>
        </div>
        <button id="checkButton" type="button">查询</button>
        <div id="result" class="result-box">
          <p class="hint">请输入一种或两种药物名称，查询详细信息或相互作用。</p>
        </div>
      </section>

      <section class="sub-card">
        <h3>常见药物用量与参考</h3>
        <div class="search-section">
          <input id="searchInput" type="text" placeholder="输入药物名称搜索" autocomplete="off" />
          <button id="searchButton" type="button">搜索</button>
        </div>
        <div class="search-suggestions" id="searchSuggestions"></div>
        <p>点击标签查看详情，或在搜索框中输入药名快速查找。</p>
        <div class="tag-list" id="sampleTags"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
